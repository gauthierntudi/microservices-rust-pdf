# fly.toml app configuration file generated for microservices-rust-pdf on 2026-05-24T04:02:45Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'microservices-rust-pdf'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  PDF_DEFAULT_DPI = '150'
  PDF_MAX_PAGES = '100'
  PDF_MAX_UPLOAD_MB = '50'
  RUST_LOG = 'authentiq_pdf_service=info'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
